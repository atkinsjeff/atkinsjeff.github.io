  about:
    enable: true
    title: About Me
    image: /images/me.jpg
    content: |-
      My research philosophy centers on understanding how the physical and spatial structure of ecosystems 
      influences the movement of energy and matter across scales—from individual plots to entire landscapes. 
      
      I approach this through integrative, systems-based research that combines modeling, remote sensing, 
      field measurements, manipulative experiments, and long-term datasets. I am committed to building 
      open-source tools for the scientific community and engaging with stakeholders to ensure scientific 
      insights inform land management and policy decisions.
    skills:
      enable: true
      title: "Research Areas:"
      items:
        - Ecosystem Ecology
        - Forest Structure
        - Remote Sensing & Lidar
        - Carbon & Water Cycling
        - Biogeochemistry
        - Watershed Hydrology
        
